name: Selenium Tests CI/CD

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  checks: write
  statuses: write
  pages: write
  id-token: write

jobs:
  # Job 1: Chạy test song song trên 3 máy ảo (Sharding)
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1]
        shardTotal: [1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Selenium Tests
        run: |
          mvn clean test -Dsurefire.failIfNoSpecifiedTests=false \
          -DshardIndex=${{ matrix.shardIndex }} \
          -DshardTotal=${{ matrix.shardTotal }} \
          -Dheadless.mode=true
        continue-on-error: true

      # Upload kết quả để Job 'report' tải về
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shardIndex }}
          path: target/allure-results/
          if-no-files-found: ignore

  # Job 2: Chỉ chạy 1 lần duy nhất sau khi test xong
  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all allure results from shards
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Prepare Allure Results
        run: |
          mkdir -p target/allure-results
          cp -r all-results/* target/allure-results/

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 0

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages-dir
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Publish Test Report Link
        run: |
          echo "## 📊 KẾT QUẢ KIỂM THỬ TỰ ĐỘNG (AUTOMATION TEST REPORT)" >> $GITHUB_STEP_SUMMARY
          echo "Hệ thống CI/CD đã hoàn thành tiến trình chạy song song trên 5 shard." >> $GITHUB_STEP_SUMMARY
          echo "| Hạng mục | Thông tin chi tiết |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Báo cáo nghiệm thu** | 👉 **[XEM BÁO CÁO ALLURE](https://hieuit1.github.io/selenium_project/)** |" >> $GITHUB_STEP_SUMMARY
