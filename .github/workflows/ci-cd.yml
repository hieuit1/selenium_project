name: Selenium Tests CI/CD

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  checks: write
  statuses: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Selenium Tests
        run: mvn clean test -Dsurefire.failIfNoSpecifiedTests=false
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 0

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        continue-on-error: true
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages-dir
          keep_reports: 20

      - name: Clean up old report
        run: |
          mkdir -p allure-history
          rm -rf allure-history/* || true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        continue-on-error: false
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
          allow_empty_commit: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Publish Test Report Link to Job Summary
        if: always()
        run: |
          echo "## 📊 KẾT QUẢ KIỂM THỬ TỰ ĐỘNG (AUTOMATION TEST REPORT)" >> $GITHUB_STEP_SUMMARY
          echo "Hệ thống CI/CD đã hoàn thành tiến trình chạy kiểm thử và trích xuất báo cáo thành công." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Hạng mục | Thông tin chi tiết |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dự án** | Selenium Automation Project |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trạng thái CI/CD** | ✅ Hoàn tất tiến trình |" >> $GITHUB_STEP_SUMMARY
          echo "| **Báo cáo nghiệm thu** | 👉 **[CLICK VÀO ĐÂY ĐỂ XEM ALLURE REPORT](https://hieuit1.github.io/selenium_project/)** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Báo cáo được khởi tạo tự động qua nền tảng Allure Report.*" >> $GITHUB_STEP_SUMMARY
